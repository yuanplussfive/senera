[senera]
enabled = true

[fast_context]
roots = [ "." ]
exclude = [ ".git", ".claude", "Dist", "**/Dist/**", "dist", "**/dist/**", "build", "**/build/**", "coverage", "**/coverage/**", "node_modules", "**/node_modules/**", "Plugins/*/node_modules", "Plugins/*/.state", ".senera", ".state", "**/.state/**", "package-lock.json" ]
max_file_mb = 0.3
max_index_files = 1200
default_max_results = 12
default_context_lines = 4
state_dir = ".state"
hybrid_min_ripgrep_results = 3
ripgrep_timeout_seconds = 8

[fast_context.index]
database = "workspace-context.sqlite"
tokenizer = "unicode61"
trigram_tokenizer = "trigram"

[fast_context.discovery]
include_gitignore = true
follow_symbolic_links = false
exclude_disabled_plugins = true
disabled_plugin_scan_depth = 6

[fast_context.chunking]
strategy = "syntax_and_window"
min_lines = 4
max_lines = 120
overlap_lines = 12

[fast_context.search]
engines = [ "ripgrep", "path_fuzzy", "sqlite_fts", "sqlite_trigram", "path" ]
term_operator = "OR"
collect_multiplier = 4
snippet_max_lines = 24

[fast_context.search.weights]
ripgrep = 3
path_fuzzy = 2.4
sqlite_fts = 1.8
sqlite_trigram = 1.4
path = 1.2
symbol = 2
combined = 1

[fast_context.search.reasons]
ripgrep = "ripgrep 精确文本命中"
path_fuzzy = "路径或文件名模糊命中"
sqlite_fts = "SQLite FTS5 全文命中"
sqlite_trigram = "SQLite trigram 子串命中"
path = "SQLite 路径索引命中"
symbol = "SQLite 符号索引命中"

[fast_context.path_fuzzy]
max_candidates = 8000
include_directories = true
threshold = 0.35
targets = [ "file_name", "path" ]

[fast_context.path_fuzzy.weights]
file_name = 1.35
path = 1

[fast_context.read]
default_line_window = 120
directory_max_children = 80
directory_child_char_budget = 120

[fast_context.scout]
max_queries = 12
max_files = 8
max_results_per_query = 10
context_lines = 4
read_line_window = 120
bootstrap_markers = true
refresh_index = false
query_sources = [ "question", "hints", "question_terms" ]

[fast_context.scout.tokenizer]
separators = [ " ", "\t", "\r", "\n", ",", "，", ".", "。", ":", "：", ";", "；", "?", "？", "!", "！", "(", ")", "[", "]", "{", "}", "\"", "'", "`", "<", ">", "|" ]
min_length = 3
max_terms = 16
case_sensitive = false

[fast_context.scout.marker_profile]
base_score = 2.2
path_match_threshold = 0.25
path_match_weight = 5
distinct_term_weight = 4
line_match_weight = 1
max_snippets = 6
source_reason = "项目标记文件"
path_reason = "标记文件路径匹配侦察查询"
content_reason = "标记文件内容匹配侦察查询"

[[fast_context.scout.marker_profile.path_targets]]
name = "文件名"
selector = "basename"
weight = 1.4

[[fast_context.scout.marker_profile.path_targets]]
name = "路径"
selector = "path"
weight = 1

[fast_context.scout.reference_profile]
enabled = true
score = 18
max_score_per_path = 54
max_references = 12
max_source_snippets = 8
min_length = 3
delimiters = [ " ", "\t", "\r", "\n", ",", "，", ";", "；", "(", ")", "[", "]", "{", "}", "\"", "'", "`", "<", ">", "|" ]
trim_characters = [ ":", "：", "。", "!", "！", "?", "？" ]
reason = "命中摘要引用了真实工作区文件"

[fast_context.scout.llm_planner]
enabled = true
mode = "llm"
max_rounds = 3
max_commands_per_round = 4
command_types = [ "rg", "readfile", "tree", "glob" ]
command_context_lines = 3
max_command_results = 8
max_observation_chars = 6000
max_candidate_summaries = 12
read_line_window = 100
tree_depth = 2
max_tree_children = 60
command_candidate_score = 6
final_candidate_score = 20

[fast_context.messages]
directory_guidance = [ "这是目录摘要，不是文件内容。", "要读取源码，请从 children 中选择具体文件路径再调用 FastContextReadTool。", "要搜索目录内逻辑，请调用 FastContextHybridSearchTool 并传入对应 roots。" ]
workspace_map_guidance = [ "优先使用 availableRoots 或 indexedRoots 中真实存在的路径。", "不确定目录时省略 roots，使用插件配置的默认检索范围。", "需要更大上下文时先用搜索结果 path，再调用读取工具按行读取。" ]
missing_path_guidance = [ "requestedPath 不存在，不能把它当作已读取文件。", "优先从 suggestions 或 parentChildren 选择真实路径再次调用 FastContextReadTool。", "如果 suggestions 为空，先读取 nearestExistingParent 或使用 FastContextHybridSearchTool 定位。" ]

[fast_context.map]
marker_files = [ "package.json", "tsconfig.json", "senera.config.json", "README.md" ]
source_root_names = [ "Source", "src", "Frontend", "Plugins", "System", "Packages" ]
entry_point_names = [ "Source", "Frontend", "Plugins", "System", "Scripts", "Packages" ]

[[fast_context.analyzers]]
name = "typescript"
strategy = "typescript_ast"
extensions = [ ".ts", ".tsx", ".js", ".jsx", ".mts", ".cts", ".mjs", ".cjs" ]
symbol_scope = "top_level_and_members"
component_name_style = "pascal_case"

[[fast_context.analyzers]]
name = "text"
strategy = "line_window"
extensions = [ "*" ]
