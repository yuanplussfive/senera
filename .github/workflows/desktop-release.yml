name: Desktop Release

on:
  workflow_dispatch:
    inputs:
      channel:
        description: Preview builds an installer; stable promotes an existing preview release.
        required: true
        type: choice
        options:
          - preview
          - stable
        default: preview
      source_sha:
        description: Verified commit SHA for a preview build. Empty uses the selected workflow revision.
        required: false
        type: string
      release_tag:
        description: Existing preview release tag to promote when channel is stable.
        required: false
        type: string

permissions:
  contents: write
  actions: read

concurrency:
  group: desktop-release-${{ inputs.source_sha || inputs.release_tag || github.sha }}
  cancel-in-progress: false

jobs:
  preview:
    name: Build Preview Installer
    if: inputs.channel == 'preview'
    runs-on: windows-latest
    environment: release-preview
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.source_sha || github.sha }}
      - id: source
        shell: pwsh
        run: |
          $sha = (git rev-parse HEAD).Trim()
          "sha=$sha" >> $env:GITHUB_OUTPUT
      - name: Require successful verification
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          SOURCE_SHA: ${{ steps.source.outputs.sha }}
        run: |
          $runs = gh run list --workflow verify.yml --commit $env:SOURCE_SHA --status success --limit 1 --json databaseId | ConvertFrom-Json
          if ($runs.Count -lt 1) {
            throw "Verify must succeed before publishing a desktop preview for $env:SOURCE_SHA."
          }
      - uses: ./.github/actions/setup-node
      - id: release
        name: Resolve release version
        shell: pwsh
        env:
          SENERA_DESKTOP_BUILD_NUMBER: ${{ github.run_number }}
          SENERA_DESKTOP_RELEASE_SHA: ${{ steps.source.outputs.sha }}
        run: npx tsx Build/DesktopReleaseInfo.ts
      - name: Build installer
        shell: pwsh
        env:
          SENERA_DESKTOP_VERSION: ${{ steps.release.outputs.version }}
        run: npm run desktoppack
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.release.outputs.artifact_name }}
          path: ${{ steps.release.outputs.artifact_path }}
          if-no-files-found: error
      - name: Publish preview release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
          RELEASE_NAME: ${{ steps.release.outputs.release_name }}
          ARTIFACT_PATH: ${{ steps.release.outputs.artifact_path }}
          SOURCE_SHA: ${{ steps.release.outputs.source_sha }}
        run: |
          $notes = "Senera desktop preview built from $env:SOURCE_SHA."
          gh release view $env:RELEASE_TAG *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $env:RELEASE_TAG $env:ARTIFACT_PATH --clobber
          } else {
            gh release create $env:RELEASE_TAG $env:ARTIFACT_PATH --target $env:SOURCE_SHA --title $env:RELEASE_NAME --notes $notes --prerelease
          }

  stable:
    name: Promote Stable Installer
    if: inputs.channel == 'stable'
    runs-on: windows-latest
    environment: release-stable
    steps:
      - name: Promote preview release without rebuilding
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:RELEASE_TAG)) {
            throw "release_tag is required when channel is stable."
          }
          $release = gh release view $env:RELEASE_TAG --json isPrerelease,targetCommitish | ConvertFrom-Json
          if (-not $release.isPrerelease) {
            throw "$env:RELEASE_TAG is not a preview release."
          }
          gh release edit $env:RELEASE_TAG --prerelease=false --latest
