name: Set up Senera Node
description: Restore the npm cache and install the locked workspace dependencies.

inputs:
  node-version:
    description: Node.js major version to install.
    required: false
    default: "22"

runs:
  using: composite
  steps:
    - uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}
        cache: npm
        cache-dependency-path: package-lock.json
    - run: npm ci
      shell: bash
