name: Container Release

on:
  workflow_dispatch:
    inputs:
      channel:
        description: Preview builds a new immutable image; stable promotes an existing one.
        required: true
        type: choice
        options:
          - preview
          - stable
        default: preview
      source_sha:
        description: Verified commit SHA to build or promote. Empty uses the selected workflow revision.
        required: false
        type: string

permissions:
  contents: read
  packages: write
  actions: read

concurrency:
  group: container-release-${{ inputs.source_sha || github.sha }}
  cancel-in-progress: false

jobs:
  source:
    name: Resolve Verified Source
    runs-on: ubuntu-latest
    outputs:
      sha: ${{ steps.commit.outputs.sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.source_sha || github.sha }}
      - id: commit
        run: |
          sha="$(git rev-parse HEAD)"
          echo "sha=$sha" >> "$GITHUB_OUTPUT"
      - name: Require successful verification
        env:
          GH_TOKEN: ${{ github.token }}
          SOURCE_SHA: ${{ steps.commit.outputs.sha }}
        run: |
          successful_runs="$(gh run list --workflow verify.yml --commit "$SOURCE_SHA" --status success --limit 1 --json databaseId --jq 'length')"
          test "$successful_runs" -ge 1

  preview:
    name: Build Preview Image
    needs: source
    if: inputs.channel == 'preview'
    runs-on: ubuntu-latest
    environment: release-preview
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.source.outputs.sha }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}
      - id: metadata
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/senera
          tags: |
            type=raw,value=sha-${{ needs.source.outputs.sha }}
            type=raw,value=preview
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.metadata.outputs.tags }}
          labels: ${{ steps.metadata.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  stable:
    name: Promote Stable Image
    needs: source
    if: inputs.channel == 'stable'
    runs-on: ubuntu-latest
    environment: release-stable
    env:
      IMAGE: ghcr.io/${{ github.repository_owner }}/senera
      SOURCE_TAG: sha-${{ needs.source.outputs.sha }}
    steps:
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}
      - name: Promote immutable image without rebuilding
        run: |
          docker buildx imagetools inspect "$IMAGE:$SOURCE_TAG"
          docker buildx imagetools create \
            --tag "$IMAGE:stable" \
            --tag "$IMAGE:latest" \
            "$IMAGE:$SOURCE_TAG"
