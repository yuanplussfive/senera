services:
  senera:
    image: ${SENERA_IMAGE:-ghcr.io/yuanplussfive/senera:latest}
    pull_policy: always
    container_name: senera
    ports:
      - "${SENERA_PORT:-8787}:8787"
    environment:
      SENERA_WORKSPACE_ROOT: /data
      AGENT_CONFIG_PATH: /data/senera.config.json
      SENERA_SERVER_HOST: 0.0.0.0
      SENERA_SERVER_PORT: 8787
      SENERA_PUBLIC_WS_URL: ${SENERA_PUBLIC_WS_URL:-}
    volumes:
      - senera-data:/data
    devices:
      - /dev/kvm:/dev/kvm
    cap_add:
      - NET_ADMIN
    restart: unless-stopped

volumes:
  senera-data:
