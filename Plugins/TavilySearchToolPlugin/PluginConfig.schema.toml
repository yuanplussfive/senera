[form]
version = 1
strict = true

[[form.sections]]
id = "senera"
label = "启用状态"

[[form.sections.fields]]
path = [ "senera", "enabled" ]
label = "启用插件"
type = "boolean"

[[form.sections]]
id = "tavily"
label = "网页搜索参数"

[[form.sections.fields]]
path = [ "tavily", "api_keys" ]
label = "接口密钥"
type = "array"
itemType = "string"
secret = true

[[form.sections.fields]]
path = [ "tavily", "base_url" ]
label = "服务地址"
type = "string"

[[form.sections.fields]]
path = [ "tavily", "timeout_seconds" ]
label = "请求超时"
type = "number"
min = 1
max = 300
step = 1

[[form.sections.fields]]
path = [ "tavily", "state_dir" ]
label = "状态目录"
type = "string"
