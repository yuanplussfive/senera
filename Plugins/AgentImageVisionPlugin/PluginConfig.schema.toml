[form]
version = 1
strict = true

[[form.sections]]
id = "senera"
label = "启用状态"

[[form.sections.fields]]
path = [ "senera", "enabled" ]
label = "启用插件"
type = "boolean"

[[form.sections]]
id = "vision"
label = "图片识别参数"

[[form.sections.fields]]
path = [ "vision", "maxImageMb" ]
label = "图片大小上限"
type = "number"
min = 0.1
step = 0.5

[[form.sections.fields]]
path = [ "vision", "allowedMimes" ]
label = "允许图片类型"
type = "array"
itemType = "string"

[[form.sections.fields]]
path = [ "vision", "systemTemplate" ]
label = "系统提示词"
type = "string"
multiline = true

[[form.sections.fields]]
path = [ "vision", "promptTemplate" ]
label = "用户提示词"
type = "string"
multiline = true

[[form.sections]]
id = "vision.provider"
label = "识图供应商"

[[form.sections.fields]]
path = [ "vision", "provider", "id" ]
label = "供应商 ID"
type = "string"

[[form.sections.fields]]
path = [ "vision", "provider", "title" ]
label = "供应商名称"
type = "string"

[[form.sections.fields]]
path = [ "vision", "provider", "kind" ]
label = "供应商类型"
type = "string"
options = [ "OpenAICompatible" ]

[[form.sections.fields]]
path = [ "vision", "provider", "endpoint" ]
label = "接口协议"
type = "string"
options = [ "Responses", "ChatCompletions", "ClaudeMessages", "GoogleGenerateContent" ]

[[form.sections.fields]]
path = [ "vision", "provider", "baseUrl" ]
label = "服务地址"
type = "string"

[[form.sections.fields]]
path = [ "vision", "provider", "apiKey" ]
label = "接口密钥"
type = "string"
secret = true

[[form.sections.fields]]
path = [ "vision", "provider", "apiVersion" ]
label = "接口版本"
type = "string"

[[form.sections.fields]]
path = [ "vision", "provider", "model" ]
label = "模型"
type = "string"

[[form.sections.fields]]
path = [ "vision", "provider", "temperature" ]
label = "温度"
type = "number"
min = 0
max = 2
step = 0.1

[[form.sections.fields]]
path = [ "vision", "provider", "maxOutputTokens" ]
label = "最大输出 tokens"
type = "number"
min = -1
step = 1

[[form.sections.fields]]
path = [ "vision", "provider", "timeoutSeconds" ]
label = "请求超时"
type = "number"
min = 0.1
step = 1

[[form.sections.fields]]
path = [ "vision", "provider", "firstTokenTimeoutSeconds" ]
label = "首 token 超时"
type = "number"
min = -1
step = 1

[[form.sections.fields]]
path = [ "vision", "provider", "maxRequestSeconds" ]
label = "总请求时限"
type = "number"
min = -1
step = 1

[[form.sections.fields]]
path = [ "vision", "provider", "maxNetworkRetries" ]
label = "网络重试次数"
type = "number"
min = 0
step = 1

[[form.sections.fields]]
path = [ "vision", "provider", "retryBaseDelaySeconds" ]
label = "重试基础等待"
type = "number"
min = 0.001
step = 0.1

[[form.sections.fields]]
path = [ "vision", "provider", "retryMaxDelaySeconds" ]
label = "重试最大等待"
type = "number"
min = 0.001
step = 1

[[form.sections.fields]]
path = [ "vision", "provider", "retryAfterMaxDelaySeconds" ]
label = "Retry-After 最大等待"
type = "number"
min = 0.001
step = 1

[[form.sections.fields]]
path = [ "vision", "provider", "headers" ]
label = "附加请求头"
type = "table"
