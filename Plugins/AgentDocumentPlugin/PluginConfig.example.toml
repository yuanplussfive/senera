[senera]
# 是否启用文档解析插件。
# type: boolean
enabled = true

[document]
# 默认处理模式：auto 会先探测，匹配到可解析文档时自动抽取正文。
# type: string
defaultMode = "auto"

# 允许的处理模式。
# type: array
modes = ["auto", "probe", "extract"]

[probe]
# 文件探测读取的头部采样字节数，用于 MIME、文本/二进制和编码识别。
# type: number
sampleBytes = 65536

# ZIP 容器探测最多保留的入口文件名数量。
# type: number
containerMaxEntries = 80

# ZIP 容器内单个探测入口最多读取的字节数。
# type: number
containerMaxEntryBytes = 262144

# OOXML/包结构内容类型清单入口。
# type: string
contentTypesEntryName = "[Content_Types].xml"

[parse]
# 是否启用本地 OCR；默认关闭，图片理解优先使用 ImageVisionTool。
# type: boolean
ocr = false

# 是否抽取嵌入图片/图表附件；默认关闭，避免 base64 膨胀。
# type: boolean
extractAttachments = false

# 是否把原始 XML/RTF 写入 AST；默认关闭，避免巨大结果。
# type: boolean
includeRawContent = false

# 是否忽略 PPT 备注、脚注等 notes。
# type: boolean
ignoreNotes = false

# 是否忽略批注。
# type: boolean
ignoreComments = false

# 是否忽略页眉页脚。
# type: boolean
ignoreHeadersAndFooters = false

# 是否忽略 PPT slide master。
# type: boolean
ignoreSlideMasters = true

# 是否忽略内部锚点链接。
# type: boolean
ignoreInternalLinks = true

# 文本输出换行分隔符。
# type: string
newlineDelimiter = "\n"

[output]
# 允许抽取的最大文件字节数。
# type: number
maxFileBytes = 52428800

# 返回给模型的纯文本预览最大字符数。
# type: number
maxTextChars = 12000

# 返回给模型的 Markdown 预览最大字符数。
# type: number
maxMarkdownChars = 16000

# 返回给模型的 chunk 数量上限。
# type: number
maxChunks = 24

# 单个 chunk 最大字符数。
# type: number
maxChunkChars = 1600

[extractors.officeparser]
# Office/PDF/富文本文档抽取器。
# type: table
type = "officeparser"
enabled = true
priority = 100

[extractors.text]
# 通用可解码文本抽取器；按 probe 信号选择，不绑定具体扩展名。
# type: table
type = "text"
enabled = true
priority = 10

[extractors.text.match]
# 文本抽取器匹配条件：任一 probe 信号命中即可。
# type: table
mediaTypes = ["text"]
isText = true

[extractors.text.decode]
# probe 没有给出编码时使用的默认解码。
# type: table
defaultEncoding = "utf8"

[extractors.officeparser.fileTypes.docx]
# officeparser 的 Word 文档 fileType 映射。
# type: table
mimes = [
  "application/vnd.openxmlformats-officedocument.wordprocessingml.document",
  "application/vnd.ms-word.document.macroenabled.12",
]
extensions = [".docx", ".docm"]

[extractors.officeparser.fileTypes.pptx]
# officeparser 的 PowerPoint fileType 映射。
# type: table
mimes = [
  "application/vnd.openxmlformats-officedocument.presentationml.presentation",
  "application/vnd.ms-powerpoint.presentation.macroenabled.12",
]
extensions = [".pptx", ".pptm"]

[extractors.officeparser.fileTypes.xlsx]
# officeparser 的 Excel fileType 映射。
# type: table
mimes = [
  "application/vnd.openxmlformats-officedocument.spreadsheetml.sheet",
  "application/vnd.ms-excel.sheet.macroenabled.12",
]
extensions = [".xlsx", ".xlsm"]

[extractors.officeparser.fileTypes.pdf]
# officeparser 的 PDF fileType 映射。
# type: table
mimes = ["application/pdf"]
extensions = [".pdf"]

[extractors.officeparser.fileTypes.odt]
# officeparser 的 OpenDocument Text fileType 映射。
# type: table
mimes = ["application/vnd.oasis.opendocument.text"]
extensions = [".odt"]

[extractors.officeparser.fileTypes.odp]
# officeparser 的 OpenDocument Presentation fileType 映射。
# type: table
mimes = ["application/vnd.oasis.opendocument.presentation"]
extensions = [".odp"]

[extractors.officeparser.fileTypes.ods]
# officeparser 的 OpenDocument Spreadsheet fileType 映射。
# type: table
mimes = ["application/vnd.oasis.opendocument.spreadsheet"]
extensions = [".ods"]

[extractors.officeparser.fileTypes.rtf]
# officeparser 的 RTF fileType 映射。
# type: table
mimes = ["application/rtf", "text/rtf"]
extensions = [".rtf"]

[extractors.officeparser.fileTypes.csv]
# officeparser 的 CSV fileType 映射。
# type: table
mimes = ["text/csv"]
extensions = [".csv"]

[extractors.officeparser.fileTypes.md]
# officeparser 的 Markdown fileType 映射。
# type: table
mimes = ["text/markdown", "text/x-markdown"]
extensions = [".md", ".markdown"]

[extractors.officeparser.fileTypes.html]
# officeparser 的 HTML fileType 映射。
# type: table
mimes = ["text/html"]
extensions = [".html", ".htm"]
