name: Verify

env:
  npm_config_cache: .npm-cache

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
    inputs:
      full_suite:
        description: Run every local verification script after the normal gates.
        required: false
        type: boolean
        default: false

concurrency:
  group: verify-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  fast:
    name: Fast Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-node
      - run: npm run policy.verify
      - run: npm run quality.baml
      - run: npm run check.types
      - run: npm run quality.lint
      - run: npm run quality.format
      - run: npm run test.backend
      - run: npm run test.frontend
      - run: npm run test.e2e
      - run: npm run build
      - run: npm run verify.suite -- workspace core e2e release

  platform-windows:
    name: Windows Platform Smoke
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-node
      - run: npm run build
      - run: npm run verify.suite -- platform

  coverage:
    name: Coverage Gate
    runs-on: ubuntu-latest
    needs:
      - fast
      - platform-windows
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-node
      - run: npm run test.coverage.frontend
      - uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: coverage/frontend
          if-no-files-found: error
      - run: npm run test.coverage.backend
      - uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: coverage/backend
          if-no-files-found: error

  all-local:
    name: All Local Verifications
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && inputs.full_suite
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-node
      - run: npm run verify.all
