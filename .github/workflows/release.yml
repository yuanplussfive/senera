name: Product Release

env:
  npm_config_cache: .npm-cache

on:
  workflow_run:
    workflows:
      - Verify
    types:
      - completed
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing vX.Y.Z release tag to rebuild after a failed product release.
        required: true
        type: string

permissions:
  actions: read
  contents: write
  packages: write
  pull-requests: write

concurrency:
  group: product-release-${{ inputs.release_tag || github.event.workflow_run.head_sha || github.sha }}
  cancel-in-progress: false

jobs:
  release-please:
    name: Prepare Version Release
    if: >-
      github.event_name == 'workflow_run' &&
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name || steps.release-state.outputs.current_tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
      - id: release-state
        name: Inspect Current Release State
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
        run: |
          current_version="$(node --input-type=module -e 'import fs from "node:fs"; const manifest = JSON.parse(fs.readFileSync("Build/Release/ReleasePleaseManifest.json", "utf8")); console.log(manifest["."]);')"
          current_tag="v${current_version}"

          echo "current_version=${current_version}" >> "$GITHUB_OUTPUT"
          echo "current_tag=${current_tag}" >> "$GITHUB_OUTPUT"

          if git ls-remote --exit-code --tags origin "refs/tags/${current_tag}" >/dev/null 2>&1; then
            echo "skip_pull_request=false" >> "$GITHUB_OUTPUT"
          else
            echo "skip_pull_request=true" >> "$GITHUB_OUTPUT"
            echo "::warning::Git tag ${current_tag} is missing; release PR creation is disabled until the current manifest release is recovered."
          fi
      - id: release
        uses: googleapis/release-please-action@v4
        with:
          config-file: Build/Release/ReleasePleaseConfig.json
          manifest-file: Build/Release/ReleasePleaseManifest.json
          skip-github-pull-request: ${{ steps.release-state.outputs.skip_pull_request }}
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || github.token }}
      - name: Require current manifest release before opening the next release PR
        if: >-
          steps.release-state.outputs.skip_pull_request == 'true' &&
          steps.release.outputs.release_created != 'true'
        env:
          CURRENT_TAG: ${{ steps.release-state.outputs.current_tag }}
        run: |
          echo "::error::Release Please manifest points to ${CURRENT_TAG}, but that GitHub release/tag is missing. Create or recover ${CURRENT_TAG}, then rerun Product Release."
          exit 1
      - name: Enable auto-merge for the generated release pull request
        if: steps.release.outputs.prs_created == 'true'
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN || github.token }}
          BASE_BRANCH: ${{ github.event.workflow_run.head_branch }}
          REPOSITORY: ${{ github.repository }}
        run: |
          mapfile -t release_pull_requests < <(
            gh pr list \
              --repo "$REPOSITORY" \
              --base "$BASE_BRANCH" \
              --state open \
              --label "autorelease: pending" \
              --limit 2 \
              --json number,headRefName \
              --jq '.[] | select(.headRefName | startswith("release-please--")) | .number'
          )

          case "${#release_pull_requests[@]}" in
            0)
              exit 0
              ;;
            1)
              gh pr merge "${release_pull_requests[0]}" --repo "$REPOSITORY" --auto --squash
              ;;
            *)
              echo "Expected at most one generated release pull request, found ${#release_pull_requests[@]}." >&2
              exit 1
              ;;
          esac

  metadata:
    name: Verify Release Metadata
    needs:
      - release-please
    if: >-
      always() && !cancelled() && (
        github.event_name == 'workflow_dispatch' ||
        needs.release-please.outputs.release_created == 'true'
      )
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.release.outputs.version }}
      tag: ${{ steps.release.outputs.tag }}
      desktop_artifact_name: ${{ steps.release.outputs.desktop_artifact_name }}
      desktop_artifact_path: ${{ steps.release.outputs.desktop_artifact_path }}
      container_version_tag: ${{ steps.release.outputs.container_version_tag }}
      container_minor_tag: ${{ steps.release.outputs.container_minor_tag }}
      sandbox_bundle_artifact_name: ${{ steps.release.outputs.sandbox_bundle_artifact_name }}
      sandbox_bundle_manifest_artifact_name: ${{ steps.release.outputs.sandbox_bundle_manifest_artifact_name }}
      source_sha: ${{ steps.source.outputs.sha }}
    env:
      RELEASE_TAG: ${{ inputs.release_tag || needs.release-please.outputs.tag_name }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}
      - uses: ./.github/actions/setup-node
      - id: source
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
      - id: release
        env:
          SENERA_RELEASE_TAG: ${{ env.RELEASE_TAG }}
          SENERA_RELEASE_SHA: ${{ steps.source.outputs.sha }}
        run: npx tsx Build/ProductReleaseInfo.ts
      - name: Require release source to match triggering verification
        if: github.event_name == 'workflow_run'
        env:
          RELEASE_SHA: ${{ steps.source.outputs.sha }}
          VERIFIED_SHA: ${{ github.event.workflow_run.head_sha }}
        run: test "$RELEASE_SHA" = "$VERIFIED_SHA"
      - name: Require successful verification
        if: github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ github.token }}
          SOURCE_SHA: ${{ steps.source.outputs.sha }}
        run: |
          successful_runs="$(gh run list --workflow verify.yml --commit "$SOURCE_SHA" --status success --limit 1 --json databaseId --jq 'length')"
          test "$successful_runs" -ge 1

  sandbox-bundle:
    name: Build Microsandbox Release Bundle
    needs:
      - metadata
    if: needs.metadata.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: release-stable
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.metadata.outputs.tag }}
      - uses: ./.github/actions/setup-node
      - name: Require hardware virtualization
        shell: bash
        run: |
          set -euo pipefail
          test -c /dev/kvm
          sudo chmod 0666 /dev/kvm
      - run: npm run build
      - name: Build content-addressed sandbox assets
        run: node Dist/Build/BuildSandboxBundle.js --output Release/SandboxBundle
      - uses: actions/upload-artifact@v4
        with:
          name: senera-sandbox-bundle-${{ needs.metadata.outputs.version }}
          path: |
            Release/SandboxBundle/${{ needs.metadata.outputs.sandbox_bundle_artifact_name }}
            Release/SandboxBundle/${{ needs.metadata.outputs.sandbox_bundle_manifest_artifact_name }}
          if-no-files-found: error
      - name: Attach sandbox assets to GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.metadata.outputs.tag }}
          BUNDLE_PATH: Release/SandboxBundle/${{ needs.metadata.outputs.sandbox_bundle_artifact_name }}
          MANIFEST_PATH: Release/SandboxBundle/${{ needs.metadata.outputs.sandbox_bundle_manifest_artifact_name }}
        run: gh release upload "$RELEASE_TAG" "$BUNDLE_PATH" "$MANIFEST_PATH" --clobber

  desktop:
    name: Build Windows Installer
    needs:
      - metadata
    if: needs.metadata.result == 'success'
    runs-on: windows-latest
    environment: release-stable
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.metadata.outputs.tag }}
      - uses: ./.github/actions/setup-node
      - run: npm run desktop.pack
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ needs.metadata.outputs.desktop_artifact_name }}
          path: ${{ needs.metadata.outputs.desktop_artifact_path }}
          if-no-files-found: error
      - name: Attach installer to GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.metadata.outputs.tag }}
          ARTIFACT_PATH: ${{ needs.metadata.outputs.desktop_artifact_path }}
        run: gh release upload $env:RELEASE_TAG $env:ARTIFACT_PATH --clobber

  container-build:
    name: Build Container Candidate
    needs:
      - metadata
    if: needs.metadata.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      reference: ${{ steps.image.outputs.tags }}
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.metadata.outputs.tag }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}
      - id: image
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/senera
          tags: |
            type=raw,value=sha-${{ needs.metadata.outputs.source_sha }}
          labels: |
            org.opencontainers.image.version=${{ needs.metadata.outputs.version }}
      - id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.image.outputs.tags }}
          labels: ${{ steps.image.outputs.labels }}
          pull: true
          cache-from: type=gha,scope=senera-release-container
          cache-to: type=gha,mode=max,scope=senera-release-container,ignore-error=true

  container-smoke:
    name: Verify Container Runtime
    needs:
      - metadata
      - sandbox-bundle
      - container-build
    if: >-
      needs.metadata.result == 'success' &&
      needs.sandbox-bundle.result == 'success' &&
      needs.container-build.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      CONTAINER_HEALTH_TIMEOUT_SECONDS: 180
    steps:
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}
      - name: Start and probe container
        shell: bash
        env:
          IMAGE: ${{ needs.container-build.outputs.reference }}@${{ needs.container-build.outputs.digest }}
          CONTAINER_NAME: senera-release-smoke-${{ github.run_id }}-${{ github.run_attempt }}
          VOLUME_NAME: senera-release-smoke-${{ github.run_id }}-${{ github.run_attempt }}
        run: |
          set -euo pipefail

          cleanup() {
            local status=$?
            trap - EXIT
            if [ "$status" -ne 0 ]; then
              docker logs "$CONTAINER_NAME" || true
            fi
            docker rm --force "$CONTAINER_NAME" >/dev/null 2>&1 || true
            docker volume rm "$VOLUME_NAME" >/dev/null 2>&1 || true
            exit "$status"
          }
          trap cleanup EXIT

          docker pull "$IMAGE"
          test -c /dev/kvm
          sudo chmod 0666 /dev/kvm
          docker run --detach --name "$CONTAINER_NAME" \
            --volume "$VOLUME_NAME:/data" \
            --device /dev/kvm:/dev/kvm \
            --cap-add NET_ADMIN \
            --env SENERA_ADMIN_LOGIN_NAME=release-smoke-admin \
            --env SENERA_ADMIN_DISPLAY_NAME="Release Smoke Administrator" \
            --env SENERA_ADMIN_PASSWORD="$(openssl rand -hex 24)" \
            --env SENERA_ALLOWED_ORIGINS="http://localhost:8787,http://127.0.0.1:8787" \
            --env SENERA_ALLOW_INSECURE_HTTP=true \
            "$IMAGE" >/dev/null
          deadline=$((SECONDS + CONTAINER_HEALTH_TIMEOUT_SECONDS))
          while true; do
            state="$(docker inspect --format '{{.State.Status}}' "$CONTAINER_NAME")"
            health="$(docker inspect --format '{{if .State.Health}}{{.State.Health.Status}}{{else}}missing{{end}}' "$CONTAINER_NAME")"
            if [ "$state" != "running" ]; then
              echo "Container exited before becoming healthy (state=$state, health=$health)." >&2
              exit 1
            fi
            case "$health" in
              healthy)
                break
                ;;
              unhealthy|missing)
                echo "Container healthcheck failed (state=$state, health=$health)." >&2
                exit 1
                ;;
            esac
            if [ "$SECONDS" -ge "$deadline" ]; then
              echo "Container did not become healthy within ${CONTAINER_HEALTH_TIMEOUT_SECONDS} seconds (state=$state, health=$health)." >&2
              exit 1
            fi
            sleep 5
          done

          docker exec "$CONTAINER_NAME" node Dist/Scripts/VerifyDockerNativeSqlite.js
          docker exec "$CONTAINER_NAME" node Dist/Scripts/VerifyDockerUserPluginWrite.js

  container:
    name: Publish Container Image
    needs:
      - metadata
      - container-build
      - container-smoke
    if: >-
      needs.metadata.result == 'success' &&
      needs.container-build.result == 'success' &&
      needs.container-smoke.result == 'success'
    runs-on: ubuntu-latest
    environment: release-stable
    steps:
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}
      - id: image
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/senera
          tags: |
            type=raw,value=${{ needs.metadata.outputs.container_version_tag }}
            type=raw,value=${{ needs.metadata.outputs.container_minor_tag }}
            type=raw,value=latest
      - name: Promote verified container digest
        shell: bash
        env:
          SOURCE_IMAGE: ${{ needs.container-build.outputs.reference }}@${{ needs.container-build.outputs.digest }}
          TARGET_TAGS: ${{ steps.image.outputs.tags }}
        run: |
          set -euo pipefail

          tag_arguments=()
          while IFS= read -r tag; do
            if [ -n "$tag" ]; then
              tag_arguments+=(--tag "$tag")
            fi
          done <<< "$TARGET_TAGS"

          if [ "${#tag_arguments[@]}" -eq 0 ]; then
            echo "No stable container tags were generated." >&2
            exit 1
          fi

          docker buildx imagetools create "${tag_arguments[@]}" "$SOURCE_IMAGE"

  publish:
    name: Publish Verified Release
    needs:
      - metadata
      - sandbox-bundle
      - desktop
      - container
    if: >-
      needs.metadata.result == 'success' &&
      needs.sandbox-bundle.result == 'success' &&
      needs.desktop.result == 'success' &&
      needs.container.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Publish draft as the latest stable release
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          RELEASE_TAG: ${{ needs.metadata.outputs.tag }}
        run: gh release edit "$RELEASE_TAG" --repo "$REPOSITORY" --draft=false --latest
