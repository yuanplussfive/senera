name: Verify

env:
  npm_config_cache: .npm-cache

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
    inputs:
      full_suite:
        description: Run every local verification script after the normal gates.
        required: false
        type: boolean
        default: false

concurrency:
  group: verify-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  commit-messages:
    name: Commit Message Gate
    if: github.event_name != 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup-node
      - id: range
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PUSH_BEFORE: ${{ github.event.before }}
          PUSH_AFTER: ${{ github.sha }}
        run: |
          if [[ "$EVENT_NAME" == "pull_request" ]]; then
            from="$(git merge-base "$PR_BASE_SHA" "$PR_HEAD_SHA")"
            to="$PR_HEAD_SHA"
          else
            from="$PUSH_BEFORE"
            to="$PUSH_AFTER"

            if [[ ! "$from" =~ ^0+$ ]]; then
              git merge-base --is-ancestor "$from" "$to"
            fi
          fi

          if [[ "$from" =~ ^0+$ ]]; then
            echo "arguments=--last --verbose" >> "$GITHUB_OUTPUT"
          else
            echo "arguments=--from=$from --to=$to --verbose" >> "$GITHUB_OUTPUT"
          fi
      - if: github.event_name == 'pull_request'
        env:
          GITHUB_PR_TITLE: ${{ github.event.pull_request.title }}
        run: node --import tsx Scripts/VerifyPullRequestTitle.ts
      - run: npm run quality.commits -- ${{ steps.range.outputs.arguments }}

  fast:
    name: Fast Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup-node
      - id: range
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PUSH_BEFORE: ${{ github.event.before }}
          PUSH_AFTER: ${{ github.sha }}
        run: |
          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            echo "arguments=" >> "$GITHUB_OUTPUT"
            exit 0
          elif [[ "$EVENT_NAME" == "pull_request" ]]; then
            from="$(git merge-base "$PR_BASE_SHA" "$PR_HEAD_SHA")"
            to="$PR_HEAD_SHA"
          else
            from="$PUSH_BEFORE"
            to="$PUSH_AFTER"

            if [[ ! "$from" =~ ^0+$ ]]; then
              git merge-base --is-ancestor "$from" "$to"
            fi
          fi

          if [[ "$from" =~ ^0+$ ]]; then
            echo "arguments=" >> "$GITHUB_OUTPUT"
          else
            echo "arguments=--from=$from --to=$to" >> "$GITHUB_OUTPUT"
          fi
      - run: npm run policy.verify
      - run: npm run quality.baml
      - run: npm run check.types
      - run: npm run quality.lint
      - run: npm run quality.format -- ${{ steps.range.outputs.arguments }}
      - run: npm run test.backend
      - run: npm run test.frontend
      - run: npm run test.e2e
      - run: npm run build
      - run: npm run verify.suite -- workspace core e2e release

  platform-windows:
    name: Windows Platform Smoke
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-node
      - run: npm run build
      - run: npm run verify.suite -- platform

  coverage:
    name: Coverage Gate
    runs-on: ubuntu-latest
    needs:
      - fast
      - platform-windows
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-node
      - run: npm run test.coverage.frontend
      - uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: coverage/frontend
          if-no-files-found: error
      - run: npm run test.coverage.backend
      - uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: coverage/backend
          if-no-files-found: error

  all-local:
    name: All Local Verifications
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && inputs.full_suite
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-node
      - run: npm run verify.all
