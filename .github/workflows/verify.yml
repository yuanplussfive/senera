name: Verify

env:
  npm_config_cache: .npm-cache

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  agent-core:
    name: Agent Core (${{ matrix.os }}, Node ${{ matrix.node }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
        node:
          - 22
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      - uses: actions/cache@v4
        with:
          path: .npm-cache
          key: ${{ runner.os }}-node-${{ matrix.node }}-npm-${{ hashFiles('package.json', 'Frontend/package.json', 'Packages/*/package.json', 'System/Plugins/*/package.json', 'Plugins/*/package.json', '.npmrc') }}
          restore-keys: |
            ${{ runner.os }}-node-${{ matrix.node }}-npm-
      - run: npm install
      - run: npm run securitycheck
      - run: npm run bamlcheck
      - run: npm run check
      - run: npm run build
      - run: npm run verifysuite -- workspace core

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: actions/cache@v4
        with:
          path: .npm-cache
          key: ${{ runner.os }}-node-22-npm-${{ hashFiles('package.json', 'Frontend/package.json', 'Packages/*/package.json', 'System/Plugins/*/package.json', 'Plugins/*/package.json', '.npmrc') }}
          restore-keys: |
            ${{ runner.os }}-node-22-npm-
      - run: npm install
      - run: npm run frontendverify
      - run: npm run frontendcoverage
      - uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: coverage/frontend
          if-no-files-found: error

  all-local:
    name: All Local Verifications
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: actions/cache@v4
        with:
          path: .npm-cache
          key: ${{ runner.os }}-node-22-npm-${{ hashFiles('package.json', 'Frontend/package.json', 'Packages/*/package.json', 'System/Plugins/*/package.json', 'Plugins/*/package.json', '.npmrc') }}
          restore-keys: |
            ${{ runner.os }}-node-22-npm-
      - run: npm install
      - run: npm run securitycheck
      - run: npm run bamlcheck
      - run: npm run verifyall
