x-senera-runtime: &senera-runtime
  image: ${SENERA_IMAGE:-ghcr.io/yuanplussfive/senera:latest}
  pull_policy: always
  environment:
    SENERA_WORKSPACE_ROOT: /data
    AGENT_CONFIG_PATH: /data/senera.config.json
    SENERA_SERVER_HOST: 0.0.0.0
    SENERA_SERVER_PORT: 8787
    # Add every exact browser Origin used to access Senera, including an IP
    # and port when applicable, for example http://192.168.1.20:8787.
    SENERA_ALLOWED_ORIGINS: "http://localhost:8787,http://127.0.0.1:8787"
    SENERA_ALLOW_INSECURE_HTTP: "true"
    SENERA_PUBLIC_WS_URL: ${SENERA_PUBLIC_WS_URL:-}
    # These values are authoritative and synchronized on every container start.
    SENERA_ADMIN_LOGIN_NAME: ""
    SENERA_ADMIN_DISPLAY_NAME: ""
    SENERA_ADMIN_PASSWORD: ""
  volumes:
    - senera-data:/data

services:
  senera:
    <<: *senera-runtime
    container_name: senera
    ports:
      - "8787:8787"
    devices:
      - /dev/kvm:/dev/kvm
    cap_add:
      - NET_ADMIN
    restart: unless-stopped

volumes:
  senera-data:
