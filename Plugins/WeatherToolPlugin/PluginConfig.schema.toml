[form]
version = 1
strict = true

[[form.sections]]
id = "senera"
label = "启用状态"

[[form.sections.fields]]
path = [ "senera", "enabled" ]
label = "启用插件"
type = "boolean"

[[form.sections]]
id = "weather"
label = "天气参数"

[[form.sections.fields]]
path = [ "weather", "provider" ]
label = "天气服务"
type = "string"
options = [ "qweather", "weatherapi", "visual_crossing" ]

[form.sections.fields.optionLabels]
qweather = "和风天气"
weatherapi = "国际天气服务"
visual_crossing = "全球天气服务"

[[form.sections.fields]]
path = [ "weather", "api_keys" ]
label = "接口密钥"
type = "array"
itemType = "string"
secret = true

[[form.sections.fields]]
path = [ "weather", "api_host" ]
label = "接口域名"
type = "string"

[[form.sections.fields]]
path = [ "weather", "weather_api_host" ]
label = "WeatherAPI 域名"
type = "string"
required = false

[[form.sections.fields]]
path = [ "weather", "base_url" ]
label = "服务基础地址"
type = "string"
required = false

[[form.sections.fields]]
path = [ "weather", "geo_base_url" ]
label = "地理编码地址"
type = "string"
required = false

[[form.sections.fields]]
path = [ "weather", "language" ]
label = "语言"
type = "string"

[[form.sections.fields]]
path = [ "weather", "unit" ]
label = "单位"
type = "string"
options = [ "metric", "imperial" ]

[form.sections.fields.optionLabels]
metric = "公制"
imperial = "英制"

[[form.sections.fields]]
path = [ "weather", "timeout_seconds" ]
label = "请求超时"
type = "number"
min = 1
max = 300
step = 1

[[form.sections.fields]]
path = [ "weather", "state_dir" ]
label = "状态目录"
type = "string"
