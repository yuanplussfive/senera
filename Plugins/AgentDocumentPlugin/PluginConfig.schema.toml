[form]
version = 1
strict = true

[[form.sections]]
id = "senera"
label = "启用状态"

[[form.sections.fields]]
path = [ "senera", "enabled" ]
label = "启用插件"
type = "boolean"
required = true

[[form.sections]]
id = "probe"
label = "文件探测"

[[form.sections.fields]]
path = [ "probe", "sampleBytes" ]
label = "采样字节数"
type = "number"
min = 1
step = 1024

[[form.sections.fields]]
path = [ "probe", "containerMaxEntries" ]
label = "容器入口数"
type = "number"
min = 1
step = 1

[[form.sections.fields]]
path = [ "probe", "containerMaxEntryBytes" ]
label = "容器入口字节数"
type = "number"
min = 1
step = 1024

[[form.sections.fields]]
path = [ "probe", "contentTypesEntryName" ]
label = "内容类型入口"
type = "string"

[[form.sections]]
id = "parse"
label = "解析选项"

[[form.sections.fields]]
path = [ "parse", "ocr" ]
label = "启用 OCR"
type = "boolean"
required = true

[[form.sections.fields]]
path = [ "parse", "extractAttachments" ]
label = "抽取附件"
type = "boolean"
required = true

[[form.sections.fields]]
path = [ "parse", "includeRawContent" ]
label = "保留原始内容"
type = "boolean"
required = true

[[form.sections.fields]]
path = [ "parse", "ignoreNotes" ]
label = "忽略备注"
type = "boolean"
required = true

[[form.sections.fields]]
path = [ "parse", "ignoreComments" ]
label = "忽略批注"
type = "boolean"
required = true

[[form.sections.fields]]
path = [ "parse", "ignoreHeadersAndFooters" ]
label = "忽略页眉页脚"
type = "boolean"
required = true

[[form.sections.fields]]
path = [ "parse", "ignoreSlideMasters" ]
label = "忽略母版"
type = "boolean"
required = true

[[form.sections.fields]]
path = [ "parse", "ignoreInternalLinks" ]
label = "忽略内部链接"
type = "boolean"
required = true

[[form.sections.fields]]
path = [ "parse", "newlineDelimiter" ]
label = "换行分隔符"
type = "string"

[[form.sections]]
id = "output"
label = "输出限制"

[[form.sections.fields]]
path = [ "output", "maxFileBytes" ]
label = "最大文件字节数"
type = "number"
min = 1
step = 1024

[[form.sections.fields]]
path = [ "output", "maxTextChars" ]
label = "文本预览字符数"
type = "number"
min = 0
step = 100

[[form.sections.fields]]
path = [ "output", "maxMarkdownChars" ]
label = "Markdown 预览字符数"
type = "number"
min = 0
step = 100

[[form.sections.fields]]
path = [ "output", "maxChunks" ]
label = "Chunk 数量"
type = "number"
min = 0
step = 1

[[form.sections.fields]]
path = [ "output", "maxChunkChars" ]
label = "Chunk 字符数"
type = "number"
min = 0
step = 100

[[form.sections]]
id = "extractors"
label = "抽取器"
description = "抽取器是可扩展的具名表；保留默认映射或按插件文档调整。"

[[form.sections.fields]]
path = [ "extractors" ]
label = "抽取器配置"
type = "table"

[[form.allowedPaths]]
path = [ "extractors" ]
recursive = true
