[form]
version = 1
strict = true

[[form.sections]]
id = "senera"
label = "启用状态"

[[form.sections.fields]]
path = [ "senera", "enabled" ]
label = "启用插件"
type = "boolean"
required = true
essential = true

[[form.sections]]
id = "weather"
label = "和风天气"

[[form.sections.fields]]
path = [ "weather", "api_keys" ]
label = "接口密钥"
type = "array"
itemType = "string"
secret = true
required = true
essential = true

[[form.sections.fields]]
path = [ "weather", "api_host" ]
label = "API URL"
type = "string"
description = "和风天气控制台分配的专属 API Host，必须包含 https://。"
required = true
essential = true

[[form.sections.fields]]
path = [ "weather", "language" ]
label = "语言"
type = "string"
required = false
essential = false

[[form.sections.fields]]
path = [ "weather", "unit" ]
label = "单位"
type = "string"
options = [ "metric", "imperial" ]
required = false
essential = false

[form.sections.fields.optionLabels]
metric = "公制"
imperial = "英制"

[[form.sections.fields]]
path = [ "weather", "timeout_seconds" ]
label = "请求超时"
type = "number"
min = 1
max = 300
step = 1
required = false
essential = false

[[form.sections.fields]]
path = [ "weather", "state_dir" ]
label = "状态目录"
type = "string"
required = false
essential = false
